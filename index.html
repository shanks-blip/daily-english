<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Daily English — 매일 영어 습관</title>
<meta name="theme-color" content="#4f46e5">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --brand: #4f46e5;
    --brand2: #2563eb;
    --accent: #059669;
    --ink: #0f172a;
    --sub: #64748b;
    --faint: #94a3b8;
    --line: #e8edf4;
    --bg: #eef1f7;
    --card: #ffffff;
    --r: 18px;
    --shadow: 0 1px 2px rgba(15,23,42,.04), 0 8px 24px -12px rgba(15,23,42,.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif; }
  body { background: var(--bg); color: var(--ink); }
  button { font-family: inherit; color: inherit; }

  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #fafbfd;
         box-shadow: 0 0 40px rgba(15,23,42,.06); padding: 22px 18px 96px; }

  .fade-in { animation: fadein .28s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  h1 { font-size: 23px; font-weight: 800; letter-spacing: -.4px; }
  .sub { color: var(--sub); font-size: 13px; margin-top: 3px; }
  .section-title { font-size: 12.5px; font-weight: 700; color: var(--sub); margin-bottom: 9px;
                   text-transform: uppercase; letter-spacing: .3px; }
  .muted { color: var(--faint); font-size: 12px; line-height: 1.55; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r);
          padding: 18px; margin-bottom: 14px; box-shadow: var(--shadow); }

  .grad { background: linear-gradient(120deg, #f97316, #f59e0b 60%, #fbbf24); color: #fff; border: none;
          display: flex; justify-content: space-between; align-items: center;
          box-shadow: 0 10px 24px -10px rgba(249,115,22,.45); }
  .grad .big { font-size: 28px; font-weight: 900; letter-spacing: -.5px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .tile { border-radius: var(--r); padding: 17px 16px; color: #fff; cursor: pointer; border: none;
          text-align: left; display: block; width: 100%; transition: transform .12s ease; }
  .tile:active { transform: scale(.97); }
  .tile p { font-size: 12px; opacity: .92; }
  .tile .num { font-size: 26px; font-weight: 900; margin: 5px 0; letter-spacing: -.5px; }
  .tile.blue { background: linear-gradient(135deg, var(--brand), var(--brand2));
               box-shadow: 0 10px 24px -10px rgba(79,70,229,.5); }
  .tile.green { background: linear-gradient(135deg, #059669, #10b981);
                box-shadow: 0 10px 24px -10px rgba(5,150,105,.5); }
  .tile.off { background: #eef1f6; color: #a6b0c0; cursor: default; box-shadow: none; }

  .bar-bg { height: 10px; background: #edf0f6; border-radius: 99px; overflow: hidden; margin: 8px 0; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--brand), var(--brand2));
              border-radius: 99px; transition: width .4s ease; }

  .week { display: flex; align-items: flex-end; gap: 7px; height: 92px; }
  .week .col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
               justify-content: flex-end; height: 100%; }
  .week .bar { width: 100%; border-radius: 6px 6px 3px 3px;
               background: linear-gradient(180deg, #a5b4fc, #818cf8); }
  .week .bar.zero { background: #edf0f6; }
  .week .lbl { font-size: 10px; color: var(--faint); }

  .chips { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 2px;
           scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { white-space: nowrap; border-radius: 99px; padding: 8px 15px; font-size: 13px; border: 1px solid var(--line);
          background: #fff; color: var(--sub); cursor: pointer; transition: all .15s ease; }
  .chip.on { background: var(--brand); border-color: var(--brand); color: #fff; font-weight: 700;
             box-shadow: 0 4px 12px -4px rgba(79,70,229,.5); }

  .btn { display: block; width: 100%; border: none; border-radius: 15px; padding: 15px; font-size: 16px;
         font-weight: 700; cursor: pointer; text-align: center; text-decoration: none;
         transition: transform .12s ease, box-shadow .15s ease; }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: linear-gradient(135deg, var(--brand), var(--brand2)); color: #fff;
                 box-shadow: 0 8px 20px -8px rgba(79,70,229,.55); }
  .btn-ghost { background: #fff; color: var(--sub); border: 1.5px solid var(--line); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn-row .btn { flex: 1; }
  .btn-row .btn.wide { flex: 2; }

  .badge { display: inline-block; border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: 600; }
  .badge.blue { background: #eef2ff; color: var(--brand); }
  .badge.gray { background: #f1f4f9; color: var(--sub); }

  .word-en { font-size: 31px; font-weight: 900; letter-spacing: -.5px; }
  .word-ko { font-size: 19px; color: #475569; margin-top: 4px; }
  .example { background: #f6f8fc; border: 1px solid var(--line); border-radius: 13px; padding: 13px; margin-top: 15px; }
  .example .en { font-size: 15px; line-height: 1.5; }
  .example .ko { font-size: 13px; color: var(--sub); margin-top: 4px; }

  .tip { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; border-radius: 13px;
         padding: 11px 13px; margin-top: 12px; font-size: 13px; line-height: 1.55; }

  .sentence { background: linear-gradient(135deg, #eef2ff, #f5f3ff); border-color: #e0e7ff; }
  .s-en { font-size: 17px; font-weight: 800; letter-spacing: -.2px; line-height: 1.4; }
  .s-ko { font-size: 13px; color: var(--sub); margin-top: 5px; }

  .speak-btn { background: #eef2ff; border: none; border-radius: 99px; width: 38px; height: 38px;
               font-size: 15px; cursor: pointer; flex-shrink: 0; transition: transform .12s ease; }
  .speak-btn:active { transform: scale(.9); }
  .speak-btn.sm { width: 30px; height: 30px; font-size: 12px; background: #f1f4f9; }
  .row { display: flex; align-items: center; gap: 10px; }

  .choice { display: block; width: 100%; text-align: left; border: 1.5px solid var(--line); background: #fff;
            border-radius: 15px; padding: 15px 16px; font-size: 16.5px; margin-bottom: 10px; cursor: pointer;
            transition: all .15s ease; box-shadow: 0 1px 2px rgba(15,23,42,.03); }
  .choice:active { transform: scale(.985); }
  .choice.correct { border-color: #22c55e; background: #f0fdf4; font-weight: 700;
                    box-shadow: 0 6px 16px -8px rgba(34,197,94,.4); }
  .choice.wrong { border-color: #f87171; background: #fef2f2; color: #dc2626; }
  .choice.dim { opacity: .4; }

  .spell-input { width: 100%; border: 1.5px solid var(--line); border-radius: 15px; padding: 15px;
                 font-size: 18px; font-family: inherit; outline: none; transition: border-color .15s ease; }
  .spell-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  .spell-fb { margin-top: 12px; border-radius: 13px; padding: 13px; font-weight: 700; font-size: 15px; }
  .spell-fb.good { background: #f0fdf4; color: #16a34a; }
  .spell-fb.bad { background: #fef2f2; color: #dc2626; }

  /* ---- 애니메이션 ---- */
  .bubble.pop { animation: bubblein .32s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes bubblein { from { opacity: 0; transform: translateY(12px) scale(.9); } to { opacity: 1; transform: none; } }
  .choice.wrong { animation: shake .3s ease; }
  @keyframes shake { 0%,100% { transform: none; } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  .choice.correct { animation: popok .3s ease; }
  @keyframes popok { 0% { transform: scale(1); } 50% { transform: scale(1.025); } 100% { transform: scale(1); } }
  .center .emoji { animation: bounce .7s cubic-bezier(.3,1.6,.5,1); display: inline-block; }
  @keyframes bounce { 0% { transform: scale(0); } 60% { transform: scale(1.18); } 100% { transform: scale(1); } }
  .wcard { animation: slidein .3s ease; }
  @keyframes slidein { from { opacity: 0; transform: translateX(26px); } to { opacity: 1; transform: none; } }
  .spell-fb { animation: fadein .25s ease; }

  .bubble-row { display: flex; margin-bottom: 10px; }
  .bubble-row.right { justify-content: flex-end; }
  .bubble { max-width: 82%; border-radius: 17px; padding: 11px 14px; font-size: 15px; line-height: 1.45; }
  .bubble.a { background: #fff; border: 1px solid var(--line); border-bottom-left-radius: 5px;
              box-shadow: var(--shadow); }
  .bubble.b { background: linear-gradient(135deg, var(--brand), var(--brand2)); color: #fff;
              border-bottom-right-radius: 5px; box-shadow: 0 6px 16px -8px rgba(79,70,229,.5); }
  .bubble .ko-line { font-size: 12px; opacity: .72; margin-top: 5px; }
  .bubble .say { background: none; border: none; cursor: pointer; font-size: 13px; padding: 0 0 0 6px; }

  .dlg-card { display: flex; align-items: center; gap: 13px; width: 100%; text-align: left;
              border: 1px solid var(--line); background: #fff; border-radius: 15px; padding: 15px;
              margin-bottom: 10px; cursor: pointer; box-shadow: var(--shadow); transition: transform .12s ease; }
  .dlg-card:active { transform: scale(.98); }
  .dlg-card .ic { font-size: 25px; }
  .dlg-card .tt { font-weight: 700; font-size: 15px; flex: 1; }
  .dlg-card .done { font-size: 12px; color: #16a34a; font-weight: 700; }
  .dlg-card .todo { font-size: 12px; color: var(--faint); }

  .center { min-height: 62vh; display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; }
  .center .emoji { font-size: 50px; }
  .center h2 { margin-top: 12px; font-size: 21px; font-weight: 800; }
  .center .desc { color: var(--sub); font-size: 14px; margin-top: 7px; line-height: 1.6; max-width: 300px; }
  .center .btn { width: auto; padding: 13px 32px; margin-top: 24px; }

  .list { border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; margin-bottom: 18px;
          background: #fff; box-shadow: var(--shadow); }
  .list .item { display: flex; align-items: center; gap: 11px; padding: 12px 14px; border-top: 1px solid #f1f4f9; }
  .list .item:first-child { border-top: none; }
  .list .item .info { flex: 1; min-width: 0; }
  .list .item .en { font-weight: 700; font-size: 15px; }
  .list .item .ko { font-size: 13px; color: var(--sub); }
  .list .item .stat { font-size: 11px; color: var(--faint); text-align: right; }
  .list .item .weak { color: #ef4444; }

  .level-card { display: block; width: 100%; text-align: left; border: 1.5px solid var(--line); background: #fff;
                border-radius: 15px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: all .15s ease; }
  .level-card.on { border-color: var(--brand); background: #eef2ff;
                   box-shadow: 0 6px 16px -8px rgba(79,70,229,.4); }
  .level-card .t { font-weight: 800; font-size: 15px; }
  .level-card .d { font-size: 12px; color: var(--sub); margin-top: 4px; }
  .level-card .p { font-size: 11px; color: var(--brand); margin-top: 6px; font-weight: 700; }

  .goal-row { display: flex; gap: 8px; }
  .goal-btn { flex: 1; border: 1.5px solid var(--line); background: #fff; border-radius: 13px; padding: 12px 0;
              font-weight: 700; color: var(--sub); cursor: pointer; transition: all .15s ease; }
  .goal-btn.on { border-color: var(--brand); background: #eef2ff; color: var(--brand); }

  .danger { border-color: #fecaca; }
  .danger .t { color: #dc2626; font-weight: 700; }
  .btn-sm { border: none; border-radius: 11px; padding: 10px 16px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-sm.red { background: #fef2f2; color: #dc2626; }
  .btn-sm.gray { background: #f1f4f9; color: #475569; }

  .progress-top { height: 8px; background: #edf0f6; border-radius: 99px; margin-bottom: 22px; }
  .progress-top div { height: 100%; background: linear-gradient(90deg, var(--brand), var(--brand2));
                      border-radius: 99px; transition: width .3s ease; }

  .footer-note { text-align: center; color: #cbd5e1; font-size: 11px; margin-top: 26px; }

  #nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
         background: rgba(255,255,255,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
         border-top: 1px solid var(--line); }
  #nav .inner { max-width: 480px; margin: 0 auto; display: flex; padding: 4px 6px calc(6px + env(safe-area-inset-bottom)); }
  #nav button { flex: 1; border: none; background: none; padding: 7px 0 6px; font-size: 10.5px; color: var(--faint);
                cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px;
                border-radius: 12px; transition: all .15s ease; }
  #nav button .ico { line-height: 1; transition: transform .15s ease; display: flex; }
  #nav button .ico svg { width: 21px; height: 21px; }
  #nav button.on { color: var(--brand); font-weight: 700; background: #eef2ff; }
  #nav button.on .ico { transform: translateY(-1px) scale(1.08); }
  #nav button.on .ico svg { stroke-width: 2.4; }

  /* SVG 아이콘 공통 */
  .speak-btn svg { width: 16px; height: 16px; color: var(--brand); }
  .speak-btn.sm svg { width: 13px; height: 13px; color: var(--sub); }
  .say svg { width: 13px; height: 13px; }
  .bubble.b .say svg { color: #fff; opacity: .85; }
  .section-title svg, .m-ic svg { width: 15px; height: 15px; vertical-align: -2px; color: var(--brand); }
  .dlg-card .ic svg { width: 22px; height: 22px; color: var(--brand); }

  /* 데일리 미션 */
  .m-item { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; background: #fff;
            border: 1.5px solid var(--line); border-radius: 13px; padding: 12px 14px; margin-bottom: 8px;
            cursor: pointer; font-size: 14px; transition: all .15s ease; }
  .m-item:active { transform: scale(.98); }
  .m-item .m-ic { display: flex; }
  .m-item .m-label { flex: 1; font-weight: 700; }
  .m-item .m-state { font-size: 12px; color: var(--brand); font-weight: 700; }
  .m-item.done { background: #f0fdf4; border-color: #bbf7d0; }
  .m-item.done .m-label { color: #16a34a; }
  .m-item.done .m-state { color: #16a34a; }
  .m-item.done .m-ic svg { color: #16a34a; }

  /* 듣기 퀴즈 */
  .listen-box { text-align: center; padding: 18px 0 22px; }
  .play-big { width: 84px; height: 84px; border-radius: 99px; border: none; cursor: pointer;
              background: linear-gradient(135deg, #0891b2, #06b6d4); color: #fff;
              box-shadow: 0 12px 28px -10px rgba(8,145,178,.55); transition: transform .12s ease; }
  .play-big:active { transform: scale(.92); }
  .play-big svg { width: 34px; height: 34px; }

  /* 문장 만들기 */
  .answer-line { min-height: 54px; border: 1.5px dashed #c7d2fe; border-radius: 13px; padding: 9px;
                 display: flex; flex-wrap: wrap; gap: 7px; align-items: center; margin-bottom: 12px; background: #fafbff; }
  .chips-pool { display: flex; flex-wrap: wrap; gap: 7px; }
  .word-chip { border: 1.5px solid var(--line); background: #fff; border-radius: 11px; padding: 9px 13px;
               font-size: 15px; font-weight: 600; cursor: pointer; transition: all .12s ease;
               box-shadow: 0 1px 2px rgba(15,23,42,.05); }
  .word-chip:active { transform: scale(.94); }
  .word-chip.on { background: #eef2ff; border-color: #c7d2fe; color: var(--brand); }
</style>
</head>
<body>
  <div id="app"><main id="view"></main></div>
  <nav id="nav">
    <div class="inner">
      <button data-tab="home"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>홈</button>
      <button data-tab="learn"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span>학습</button>
      <button data-tab="review"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg></span>복습</button>
      <button data-tab="talk"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg></span>회화</button>
      <button data-tab="words"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span>단어장</button>
      <button data-tab="settings"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg></span>설정</button>
    </div>
  </nav>
  <script src="icons.js"></script>
  <script src="data.js"></script>
  <script src="data2.js"></script>
  <script src="data-lv4.js"></script>
  <script src="data-daily.js"></script>
  <script src="tips.js"></script>
  <script src="dialogs.js"></script>
  <script src="dialogs-extra.js"></script>
  <script src="dialogs-daily.js"></script>
  <script src="sentences.js"></script>
  <script src="app.js"></script>
  <script src="activities.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="sync.js"></script>
</body>
</html>
